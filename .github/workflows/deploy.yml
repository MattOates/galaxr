name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual re-deploy from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the minimum permissions needed
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress deploys are not cancelled
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build
        env:
          # actions/configure-pages outputs the correct base path (e.g. /galaxr/)
          VITE_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
