name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── Production build (smoke-tests the bundler) ────────────────────────
      - name: Build
        run: npm run build
        env:
          # Use a neutral base for the CI build check
          VITE_BASE: /
